server {
    # Listen on port 80 (standard HTTP traffic)
    listen 80;
    
    # Catch-all for any domain/IP
    server_name _; 

    location / {
        # Forward traffic to the Flask app running in Docker on port 5000
        proxy_pass http://127.0.0.1:5000;
        
        # Pass essential headers so Flask knows the original client IP and Host
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Optional: Increase timeouts just in case an algorithm simulation takes long
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }
}
