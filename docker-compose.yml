version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5001:5000"
    volumes:
      - .:/app
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    # Override gunicorn with flask debug server for local development & hot-reloading
    command: flask run --host=0.0.0.0 --port=5000
